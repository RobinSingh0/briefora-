name: Cloud News Sync

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  sync:
    name: Run Python Sync Cycle
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 🔑 Setup Firebase Service Account
        if: always()
        run: |
          if [ -z "$FIREBASE_SECRET" ]; then
            echo "::warning title=Missing Secret::FIREBASE_SERVICE_ACCOUNT is not set. The sync will skip initialization."
            touch service-account.json
          else
            echo "$FIREBASE_SECRET" > service-account.json
          fi
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 🔄 Run Sync Script
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/newspaper_sync.py

