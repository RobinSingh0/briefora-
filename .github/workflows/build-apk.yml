name: Build Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🔑 Setup Google Services (Android)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_ANDROID }}
        run: echo "$GOOGLE_SERVICES_JSON" > google-services.json

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 Build APK
        run: npx eas build --platform android --profile preview --non-interactive
