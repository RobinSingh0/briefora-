name: Pulse News Update

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 mins (more stable for GitHub)
  workflow_dispatch:
  repository_dispatch:
    types: [ping_heartbeat]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔄 Run Triple-Burst Pulse Cycle
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          for i in {1..3}
          do
            echo "🚀 Starting Update Cycle $i of 3..."
            node scripts/update_news.js
            if [ $i -lt 3 ]; then
              echo "💤 Waiting 180 seconds for next heartbeat..."
              sleep 180
            fi
          done
